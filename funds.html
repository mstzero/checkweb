<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fon Analisti — Market Signal Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg-primary: #0a0e17; --bg-secondary: #111827; --bg-card: #1a2233;
  --text-primary: #e5e7eb; --text-secondary: #9ca3af; --text-muted: #6b7280;
  --accent-green: #10b981; --accent-red: #ef4444; --accent-blue: #3b82f6;
  --accent-yellow: #f59e0b; --border: #1f2937;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--bg-primary); color:var(--text-primary); min-height:100vh; }
.container { max-width:1400px; margin:0 auto; padding:0 20px; }
.header { padding:16px 0; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.logo { font-size:24px; font-weight:800; color:var(--text-primary); text-decoration:none; }
.logo span { color:var(--accent-blue); }
.header-nav { display:flex; gap:8px; align-items:center; }
.nav-btn { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:var(--bg-card); color:var(--text-secondary); font-size:13px; font-weight:500; cursor:pointer; text-decoration:none; transition:all 0.2s; }
.nav-btn:hover { background:var(--bg-card-hover); color:var(--text-primary); }
.nav-btn.active { background:var(--accent-blue); color:white; border-color:var(--accent-blue); }
.header-meta { font-size:12px; color:var(--text-muted); }

/* Top Funds Row */
.top-funds { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin:24px 0 14px; }
@media(max-width:900px){ .top-funds{grid-template-columns:repeat(2,1fr);} }
.top-fund-card { background:var(--bg-card); border-radius:12px; padding:20px; border:1px solid var(--border); cursor:pointer; transition:all 0.2s; }
.top-fund-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.4); }
.top-fund-rank { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
.top-fund-code { font-size:20px; font-weight:700; margin-bottom:4px; }
.top-fund-name { font-size:12px; color:var(--text-secondary); margin-bottom:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.top-fund-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.top-stat { font-size:11px; }
.top-stat-label { color:var(--text-muted); }
.top-stat-value { font-weight:600; }
.category-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:0 0 20px; }
@media(max-width:900px){ .category-grid{grid-template-columns:repeat(2,1fr);} }
.category-card { text-align:left; background:rgba(26,34,51,0.78); border:1px solid var(--border); border-radius:10px; padding:14px; color:var(--text-primary); cursor:pointer; transition:all 0.18s; font-family:inherit; }
.category-card:hover { border-color:rgba(59,130,246,0.75); background:rgba(59,130,246,0.1); transform:translateY(-2px); }
.category-card.active { border-color:var(--accent-blue); box-shadow:0 0 0 1px rgba(59,130,246,0.25); }
.category-title { font-size:13px; font-weight:800; margin-bottom:10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.category-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.category-stat { font-size:11px; color:var(--text-muted); }
.category-stat strong { display:block; color:var(--text-primary); font-size:13px; margin-top:2px; font-variant-numeric:tabular-nums; }
.positive { color:var(--accent-green); } .negative { color:var(--accent-red); }

/* Filters */
.filters-bar { display:flex; gap:12px; margin:20px 0; flex-wrap:wrap; align-items:center; }
.filters-bar select, .filters-bar input { padding:8px 14px; border-radius:8px; border:1px solid var(--border); background:var(--bg-card); color:var(--text-primary); font-size:13px; font-family:inherit; }
.filters-bar select:focus { border-color:var(--accent-blue); outline:none; }
.search-input { flex:1; min-width:200px; }
.sort-btn { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:var(--bg-card); color:var(--text-secondary); font-size:13px; cursor:pointer; font-family:inherit; }
.sort-btn.active { background:var(--accent-blue); color:white; border-color:var(--accent-blue); }

/* Table */
.table-wrap { overflow-x:auto; border-radius:12px; border:1px solid var(--border); box-shadow:0 16px 36px rgba(0,0,0,0.22); }
table { width:100%; min-width:1880px; border-collapse:collapse; font-size:13px; }
th { text-align:left; padding:10px 12px; border-bottom:1px solid var(--border); color:var(--text-muted); font-weight:700; font-size:10px; text-transform:uppercase; background:var(--bg-card); cursor:pointer; white-space:nowrap; position:sticky; top:0; z-index:2; }
th:hover { color:var(--text-primary); }
th.sortable { user-select:none; }
th.sortable::after { content:"↕"; margin-left:6px; color:var(--text-muted); font-size:10px; }
th.sortable.sort-asc::after { content:"↑"; color:var(--accent-blue); }
th.sortable.sort-desc::after { content:"↓"; color:var(--accent-blue); }
td { padding:10px 12px; border-bottom:1px solid rgba(31,41,55,0.5); white-space:nowrap; }
tr:hover td { background:rgba(255,255,255,0.02); cursor:pointer; }
tr.selected td { background:rgba(59,130,246,0.08); }
.badge-fire { background:rgba(245,158,11,0.15); color:var(--accent-yellow); padding:2px 8px; border-radius:4px; font-size:11px; }
.badge-sinyal { background:rgba(16,185,129,0.12); color:var(--accent-green); padding:2px 8px; border-radius:4px; font-size:11px; }
.badge-normal { color:var(--text-muted); font-size:11px; }
.num { text-align:right; font-variant-numeric:tabular-nums; }
.fund-name-cell { max-width:260px; overflow:hidden; text-overflow:ellipsis; }

/* Detail Panel */
.detail-panel { display:none; background:var(--bg-card); border-radius:16px; border:1px solid var(--border); padding:28px; margin:24px 0; }
.detail-panel.open { display:block; }
.detail-header { display:flex; justify-content:space-between; align-items:start; margin-bottom:24px; }
.detail-code { font-size:26px; font-weight:800; }
.detail-name { font-size:14px; color:var(--text-secondary); margin-top:4px; }
.detail-category { display:inline-block; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; margin-top:8px; background:rgba(59,130,246,0.15); color:var(--accent-blue); }
.source-links { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
.source-link { display:inline-flex; align-items:center; min-height:30px; padding:6px 10px; border-radius:8px; border:1px solid var(--border); color:var(--text-secondary); text-decoration:none; font-size:12px; font-weight:700; }
.source-link:hover { border-color:var(--accent-blue); color:var(--text-primary); background:rgba(59,130,246,0.1); }
.detail-close { background:none; border:1px solid var(--border); color:var(--text-secondary); width:32px; height:32px; border-radius:8px; cursor:pointer; font-size:16px; }
.detail-stats { display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:24px; }
@media(max-width:900px){ .detail-stats{grid-template-columns:repeat(3,1fr);} }
.ds-item { background:rgba(0,0,0,0.25); border-radius:10px; padding:14px; text-align:center; }
.ds-label { font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-bottom:4px; }
.ds-value { font-size:18px; font-weight:700; }

/* Monte Carlo Chart */
.mc-section { margin-bottom:24px; }
.mc-title { font-size:15px; font-weight:600; margin-bottom:12px; }
.mc-chart { height:260px; position:relative; }

/* Flow section */
.flow-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:16px; }
@media(max-width:700px){ .flow-grid{grid-template-columns:repeat(2,1fr);} }
.flow-item { background:rgba(0,0,0,0.2); border-radius:8px; padding:12px; }
.flow-label { font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-bottom:2px; }
.flow-value { font-size:15px; font-weight:600; }

.result-count { font-size:13px; color:var(--text-muted); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="index.html" class="logo">Market<span>Signal</span>Hub</a>
    <div class="header-nav">
      <a href="index.html" class="nav-btn">Piyasalar</a>
      <a href="tcmb.html" class="nav-btn">TCMB</a>
      <span class="nav-btn active">📊 Fon Analisti</span>
    </div>
    <div class="header-meta" id="lastUpdated">—</div>
  </div>

  <!-- Top Funds -->
  <div class="top-funds" id="topFunds"></div>
  <div class="category-grid" id="categoryCards"></div>

  <!-- Filters -->
  <div class="filters-bar">
    <select id="filterCategory"><option value="">Tüm Kategoriler</option></select>
    <select id="filterFX"><option value="">TL / Döviz Tümü</option><option value="TL Bazlı">TL Bazlı</option><option value="Döviz Bazlı">Döviz Bazlı</option></select>
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Fon kodu veya adı ara...">
    <button class="sort-btn active" data-sort="nihai_puan">🏆 Nihai Puan</button>
    <button class="sort-btn" data-sort="getiri_1y">📈 1 Yıllık</button>
    <button class="sort-btn" data-sort="getiri_6a">6 Ay</button>
    <button class="sort-btn" data-sort="sharpe">⭐ Sharpe</button>
    <button class="sort-btn" data-sort="weekly_flow_tl">💸 Haftalık Para</button>
    <button class="sort-btn" data-sort="daily_flow_tl">Günlük Para</button>
    <span class="result-count" id="resultCount"></span>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th class="sortable" data-sort-key="firsat_sinyali" data-sort-type="text">Sinyal</th>
        <th class="sortable" data-sort-key="code" data-sort-type="text">Kod</th>
        <th class="sortable" data-sort-key="name" data-sort-type="text">Fon Adı</th>
        <th class="sortable" data-sort-key="category" data-sort-type="text">Kategori</th>
        <th class="sortable" data-sort-key="price">Fiyat</th>
        <th class="sortable" data-sort-key="number_of_investors">Yatırımcı</th>
        <th class="sortable" data-sort-key="market_cap">Portföy</th>
        <th class="sortable" data-sort-key="daily_flow_tl">Günlük Akış</th>
        <th class="sortable" data-sort-key="weekly_flow_tl">Haftalık Akış</th>
        <th class="sortable" data-sort-key="monthly_flow_tl">Aylık Akış</th>
        <th class="sortable" data-sort-key="weekly_flow_pct">Haftalık Büyüme</th>
        <th class="sortable" data-sort-key="getiri_1a">1A %</th>
        <th class="sortable" data-sort-key="getiri_3a">3A %</th>
        <th class="sortable" data-sort-key="getiri_6a">6A %</th>
        <th class="sortable" data-sort-key="getiri_1y">1Y %</th>
        <th class="sortable" data-sort-key="net_getiri_1y">Net 1Y %</th>
        <th class="sortable" data-sort-key="stopaj_orani">Stopaj</th>
        <th class="sortable" data-sort-key="sharpe">Sharpe</th>
        <th class="sortable" data-sort-key="max_drawdown">Max DD</th>
        <th class="sortable" data-sort-key="stres_skoru">Stres</th>
        <th class="sortable" data-sort-key="nihai_puan">Nihai Puan</th>
      </tr></thead>
      <tbody id="fundsBody"></tbody>
    </table>
  </div>

  <!-- Detail Panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <div>
        <div class="detail-code" id="dCode">—</div>
        <div class="detail-name" id="dName">—</div>
        <div class="detail-category" id="dCategory">—</div>
        <div class="source-links" id="dLinks"></div>
      </div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-stats" id="dStats"></div>
    <div class="mc-section">
      <div class="mc-title">🎲 Monte Carlo Simülasyonu (10.000₺ başlangıç, 1000 senaryo)</div>
      <div class="mc-chart"><canvas id="mcChart"></canvas></div>
    </div>
    <div class="flow-grid" id="dFlows"></div>
  </div>
</div>

<script>
let FUNDS = [];
let CATEGORIES = [];
let selectedFund = null;
let currentSort = 'nihai_puan';
let currentSortDir = 'desc';
let mcChart = null;

async function loadFunds() {
  try {
    const resp = await fetch('data/funds_data.json?t=' + Date.now());
    const data = await resp.json();
    FUNDS = data.funds || [];
    CATEGORIES = [...new Set(FUNDS.map(f => f.category))].sort();
    document.getElementById('lastUpdated').textContent = 'Güncelleme: ' + (data.last_updated || '—') + ' · ' + data.total_funds + ' fon';
    populateFilters();
    renderTopFunds(data.top_funds || []);
    renderCategoryCards();
    renderTable();
  } catch(e) {
    console.error('Funds load failed:', e);
    document.getElementById('fundsBody').innerHTML = '<tr><td colspan="21" style="text-align:center;padding:48px;color:var(--text-muted)">Veri yüklenemedi. Dosya henüz oluşturulmamış olabilir.</td></tr>';
  }
}

function formatTL(v) {
  if (v == null) return '—';
  const sign = v < 0 ? '-' : '';
  const abs = Math.abs(v);
  if (abs >= 1e9) return sign + (abs / 1e9).toFixed(2) + ' Mr ₺';
  if (abs >= 1e6) return sign + (abs / 1e6).toFixed(1) + 'M ₺';
  if (abs >= 1e3) return sign + (abs / 1e3).toFixed(0) + 'K ₺';
  return sign + abs.toFixed(0) + ' ₺';
}

function pct(v, digits = 2) {
  return v != null ? v.toFixed(digits) + '%' : '—';
}

function tone(v) {
  return (v || 0) >= 0 ? 'positive' : 'negative';
}

function slugifyTR(text) {
  return (text || '')
    .toLowerCase()
    .replaceAll('ğ', 'g').replaceAll('ü', 'u').replaceAll('ş', 's')
    .replaceAll('ı', 'i').replaceAll('ö', 'o').replaceAll('ç', 'c')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function kapFundUrl(fund) {
  return 'https://www.kap.org.tr/tr/fon-bildirimleri/' + slugifyTR((fund.code || '') + '-' + (fund.name || ''));
}

function populateFilters() {
  const sel = document.getElementById('filterCategory');
  CATEGORIES.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat; opt.textContent = cat;
    sel.appendChild(opt);
  });
}

function renderTopFunds(top) {
  const grid = document.getElementById('topFunds');
  const show = top.slice(0, 3);
  grid.innerHTML = show.map((f, i) => `
    <div class="top-fund-card" onclick="selectFund('${f.code}')">
      <div class="top-fund-rank">🏆 #${i+1} En İyi Fon</div>
      <div class="top-fund-code">${f.code}</div>
      <div class="top-fund-name">${(f.name || '').slice(0, 50)}</div>
      <div class="top-fund-stats">
        <div class="top-stat"><div class="top-stat-label">Son 1 Ay</div><div class="top-stat-value ${tone(f.getiri_1a)}">${pct(f.getiri_1a)}</div></div>
        <div class="top-stat"><div class="top-stat-label">Yatırımcı</div><div class="top-stat-value">${f.number_of_investors!=null?f.number_of_investors.toLocaleString('tr'):'—'}</div></div>
        <div class="top-stat"><div class="top-stat-label">Büyüklük</div><div class="top-stat-value">${formatTL(f.market_cap)}</div></div>
        <div class="top-stat"><div class="top-stat-label">Nihai Puan</div><div class="top-stat-value positive">${f.nihai_puan!=null?f.nihai_puan.toFixed(1):'—'}</div></div>
      </div>
    </div>
  `).join('');
}

function renderCategoryCards() {
  const grid = document.getElementById('categoryCards');
  const byCategory = new Map();
  FUNDS.forEach(f => {
    const category = f.category || 'Diğer/Sınıflandırılamayan';
    const item = byCategory.get(category) || { category, count: 0, investors: 0, marketCap: 0, scoreTotal: 0, scoreCount: 0 };
    item.count += 1;
    item.investors += Number(f.number_of_investors || 0);
    item.marketCap += Number(f.market_cap || 0);
    if (f.nihai_puan != null) {
      item.scoreTotal += Number(f.nihai_puan || 0);
      item.scoreCount += 1;
    }
    byCategory.set(category, item);
  });

  const all = [...byCategory.values()].sort((a, b) => b.investors - a.investors);
  const para = all.find(item => item.category === 'Para Piyasası');
  const popular = all.filter(item => item.category !== 'Para Piyasası').slice(0, para ? 7 : 8);
  const cards = para ? [para, ...popular] : popular;

  grid.innerHTML = cards.map(item => `
    <button class="category-card" data-category="${item.category}">
      <div class="category-title">${item.category}</div>
      <div class="category-stats">
        <div class="category-stat">Fon<strong>${item.count.toLocaleString('tr')}</strong></div>
        <div class="category-stat">Yatırımcı<strong>${item.investors.toLocaleString('tr')}</strong></div>
        <div class="category-stat">Büyüklük<strong>${formatTL(item.marketCap)}</strong></div>
        <div class="category-stat">Ort. Puan<strong>${item.scoreCount ? (item.scoreTotal / item.scoreCount).toFixed(1) : '—'}</strong></div>
      </div>
    </button>
  `).join('');

  document.querySelectorAll('.category-card').forEach(card => {
    card.addEventListener('click', () => {
      document.getElementById('filterCategory').value = card.dataset.category || '';
      renderTable();
      renderCategoryActiveState();
    });
  });
  renderCategoryActiveState();
}

function renderCategoryActiveState() {
  const selectedCategory = document.getElementById('filterCategory').value;
  document.querySelectorAll('.category-card').forEach(card => {
    card.classList.toggle('active', card.dataset.category === selectedCategory);
  });
}

function getFilteredFunds() {
  const cat = document.getElementById('filterCategory').value;
  const fx = document.getElementById('filterFX').value;
  const search = document.getElementById('searchInput').value.toLowerCase();
  let list = FUNDS.filter(f => {
    if (cat && f.category !== cat) return false;
    if (fx && f.is_fx !== fx) return false;
    if (search && !f.code.toLowerCase().includes(search) && !(f.name||'').toLowerCase().includes(search)) return false;
    return true;
  });
  list.sort((a, b) => compareFunds(a, b, currentSort, currentSortDir));
  return list;
}

function compareFunds(a, b, key, dir) {
  const th = document.querySelector(`th[data-sort-key="${key}"]`);
  const sortType = th?.dataset.sortType || 'number';
  const modifier = dir === 'asc' ? 1 : -1;
  if (sortType === 'text') {
    const va = String(a[key] || '').toLocaleLowerCase('tr');
    const vb = String(b[key] || '').toLocaleLowerCase('tr');
    return va.localeCompare(vb, 'tr') * modifier;
  }
  const va = Number(a[key] ?? Number.NEGATIVE_INFINITY);
  const vb = Number(b[key] ?? Number.NEGATIVE_INFINITY);
  return (va - vb) * modifier;
}

function updateSortIndicators() {
  document.querySelectorAll('th.sortable').forEach(th => {
    th.classList.toggle('sort-asc', th.dataset.sortKey === currentSort && currentSortDir === 'asc');
    th.classList.toggle('sort-desc', th.dataset.sortKey === currentSort && currentSortDir === 'desc');
  });
  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.sort === currentSort);
  });
}

function renderTable() {
  const list = getFilteredFunds();
  document.getElementById('resultCount').textContent = list.length + ' fon';
  updateSortIndicators();
  const tbody = document.getElementById('fundsBody');
  tbody.innerHTML = list.map(f => {
    const sig = f.firsat_sinyali;
    const sigBadge = sig && sig.includes('🔥') ? '<span class="badge-fire">' + sig + '</span>' :
                     sig && sig !== 'Normal' ? '<span class="badge-sinyal">' + sig + '</span>' :
                     '<span class="badge-normal">' + (sig||'Normal') + '</span>';
    return `<tr class="${selectedFund === f.code ? 'selected' : ''}" onclick="selectFund('${f.code}')">
      <td>${sigBadge}</td>
      <td><strong>${f.code}</strong></td>
      <td class="fund-name-cell">${(f.name||'').slice(0,72)}</td>
      <td>${f.category||'—'}</td>
      <td class="num">${f.price!=null?f.price.toFixed(4):'—'}</td>
      <td class="num">${f.number_of_investors!=null?f.number_of_investors.toLocaleString('tr'):'—'}</td>
      <td class="num">${formatTL(f.market_cap)}</td>
      <td class="num ${tone(f.daily_flow_tl)}">${formatTL(f.daily_flow_tl)}</td>
      <td class="num ${tone(f.weekly_flow_tl)}">${formatTL(f.weekly_flow_tl)}</td>
      <td class="num ${tone(f.monthly_flow_tl)}">${formatTL(f.monthly_flow_tl)}</td>
      <td class="num ${tone(f.weekly_flow_pct)}">${pct(f.weekly_flow_pct)}</td>
      <td class="num ${tone(f.getiri_1a)}">${pct(f.getiri_1a)}</td>
      <td class="num ${tone(f.getiri_3a)}">${pct(f.getiri_3a)}</td>
      <td class="num ${tone(f.getiri_6a)}">${pct(f.getiri_6a)}</td>
      <td class="num ${tone(f.getiri_1y)}">${pct(f.getiri_1y)}</td>
      <td class="num ${tone(f.net_getiri_1y)}">${pct(f.net_getiri_1y)}</td>
      <td class="num">${pct(f.stopaj_orani, 1)}</td>
      <td class="num">${f.sharpe!=null?f.sharpe.toFixed(2):'—'}</td>
      <td class="num negative">${pct(f.max_drawdown, 1)}</td>
      <td class="num">${f.stres_skoru!=null?f.stres_skoru.toFixed(1):'—'}</td>
      <td class="num"><strong>${f.nihai_puan!=null?f.nihai_puan.toFixed(1):'—'}</strong></td>
    </tr>`;
  }).join('');
}

function selectFund(code) {
  selectedFund = code;
  renderTable();
  showDetail(code);
  document.getElementById('detailPanel').scrollIntoView({behavior:'smooth'});
}

function showDetail(code) {
  const f = FUNDS.find(x => x.code === code);
  if (!f) return;
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('dCode').textContent = f.code;
  document.getElementById('dName').textContent = f.name || '';
  document.getElementById('dCategory').textContent = (f.category||'') + ' · ' + (f.is_fx||'');
  document.getElementById('dLinks').innerHTML = `
    <a class="source-link" href="https://www.tefas.gov.tr/FonAnaliz.aspx?FonKod=${encodeURIComponent(f.code)}" target="_blank" rel="noopener">TEFAS</a>
    <a class="source-link" href="${kapFundUrl(f)}" target="_blank" rel="noopener">KAP Fon Sayfası</a>
    <a class="source-link" href="https://www.kap.org.tr/tr/YatirimFonlari/YF" target="_blank" rel="noopener">KAP Fon Listesi</a>
  `;

  // Stats
  const stats = [
    ['Fiyat', f.price!=null?f.price.toFixed(4)+' ₺':'—'],
    ['1 Aylık', f.getiri_1a!=null?f.getiri_1a.toFixed(2)+'%':'—', f.getiri_1a>=0],
    ['3 Aylık', f.getiri_3a!=null?f.getiri_3a.toFixed(2)+'%':'—', f.getiri_3a>=0],
    ['6 Aylık', f.getiri_6a!=null?f.getiri_6a.toFixed(2)+'%':'—', f.getiri_6a>=0],
    ['1 Yıllık', f.getiri_1y!=null?f.getiri_1y.toFixed(2)+'%':'—', f.getiri_1y>=0],
    ['Net 1A', f.net_getiri_1a!=null?f.net_getiri_1a.toFixed(2)+'%':'—', (f.net_getiri_1a||0)>=0],
    ['Net 3A', f.net_getiri_3a!=null?f.net_getiri_3a.toFixed(2)+'%':'—', (f.net_getiri_3a||0)>=0],
    ['Net 6A', f.net_getiri_6a!=null?f.net_getiri_6a.toFixed(2)+'%':'—', (f.net_getiri_6a||0)>=0],
    ['Net 1Y', f.net_getiri_1y!=null?f.net_getiri_1y.toFixed(2)+'%':'—', (f.net_getiri_1y||0)>=0],
    ['Stopaj', f.stopaj_orani!=null?f.stopaj_orani.toFixed(1)+'%':'—'],
    ['Portföy', f.market_cap!=null?(f.market_cap/1e6).toFixed(0)+'M ₺':'—'],
    ['Yatırımcı', f.number_of_investors!=null?f.number_of_investors.toLocaleString('tr'):'—'],
    ['Sharpe', f.sharpe!=null?f.sharpe.toFixed(2):'—'],
    ['Sortino', f.sortino!=null?f.sortino.toFixed(2):'—'],
    ['Max DD', f.max_drawdown!=null?f.max_drawdown.toFixed(1)+'%':'—', false],
    ['Oynaklık', f.volatility!=null?f.volatility.toFixed(2)+'%':'—'],
    ['Win Rate', f.win_rate!=null?f.win_rate.toFixed(1)+'%':'—'],
    ['Nihai Puan', f.nihai_puan!=null?f.nihai_puan.toFixed(1):'—', (f.nihai_puan||0)>=50],
  ];
  document.getElementById('dStats').innerHTML = stats.map(([l,v,pos]) =>
    `<div class="ds-item"><div class="ds-label">${l}</div><div class="ds-value ${pos===true?'positive':pos===false?'negative':''}">${v}</div></div>`
  ).join('');

  // Flows
  document.getElementById('dFlows').innerHTML = [
    ['Günlük Para Girişi', formatTL(f.daily_flow_tl), (f.daily_flow_tl||0)>=0],
    ['Haftalık Para Girişi', formatTL(f.weekly_flow_tl), (f.weekly_flow_tl||0)>=0],
    ['Aylık Para Girişi', formatTL(f.monthly_flow_tl), (f.monthly_flow_tl||0)>=0],
    ['Haftalık Büyüme', f.weekly_flow_pct!=null?f.weekly_flow_pct.toFixed(2)+'%':'—',(f.weekly_flow_pct||0)>=0],
    ['Haftalık Yatırımcı Artışı', f.weekly_investor_growth_pct!=null?f.weekly_investor_growth_pct.toFixed(2)+'%':'—',(f.weekly_investor_growth_pct||0)>=0],
    ['Aylık Yatırımcı Artışı', f.monthly_investor_growth_pct!=null?f.monthly_investor_growth_pct.toFixed(2)+'%':'—',(f.monthly_investor_growth_pct||0)>=0],
    ['Fırsat Sinyali', f.firsat_sinyali||'Normal'],
    ['Enflasyon Durumu', f.enflasyon_durumu||'—'],
  ].map(([l,v,pos]) =>
    `<div class="flow-item"><div class="flow-label">${l}</div><div class="flow-value ${pos===true?'positive':pos===false?'negative':''}">${v}</div></div>`
  ).join('');

  // Monte Carlo Chart
  const months = ['Bugün','1 Ay','3 Ay','6 Ay','12 Ay'];
  const median = [10000, f.mc_1a_median||10000, f.mc_3a_median||10000, f.mc_6a_median||10000, f.mc_12a_median||10000];
  const p5 = [10000, f.mc_1a_p5||10000, f.mc_1a_p5||10000, f.mc_1a_p5||10000, f.mc_12a_p5||10000];
  const p95 = [10000, f.mc_1a_p95||10000, f.mc_1a_p95||10000, f.mc_1a_p95||10000, f.mc_12a_p95||10000];
  if (mcChart) mcChart.destroy();
  const ctx = document.getElementById('mcChart').getContext('2d');
  mcChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: months,
      datasets: [
        { label:'En İyimser (P95)', data:p95, borderColor:'#10b981', backgroundColor:'rgba(16,185,129,0.1)', tension:0.3, fill:1, pointRadius:0, borderWidth:1.5, borderDash:[4,4] },
        { label:'Medyan', data:median, borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,0.1)', tension:0.3, fill:0, pointRadius:3, borderWidth:2.5 },
        { label:'En Kötümser (P5)', data:p5, borderColor:'#ef4444', backgroundColor:'rgba(239,68,68,0.1)', tension:0.3, fill:0, pointRadius:0, borderWidth:1.5, borderDash:[4,4] },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'bottom', labels:{ color:'#9ca3af', boxWidth:12, padding:20 } } },
      scales:{
        x:{ ticks:{color:'#6b7280',font:{size:11}}, grid:{color:'rgba(31,41,55,0.5)'} },
        y:{ ticks:{color:'#6b7280',callback:v=>v.toLocaleString('tr')+' ₺'}, grid:{color:'rgba(31,41,55,0.5)'} }
      }
    }
  });
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedFund = null;
  renderTable();
}

// Events
document.getElementById('filterCategory').addEventListener('change', renderTable);
document.getElementById('filterCategory').addEventListener('change', renderCategoryActiveState);
document.getElementById('filterFX').addEventListener('change', renderTable);
document.getElementById('searchInput').addEventListener('input', renderTable);
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    const nextSort = this.dataset.sort;
    currentSortDir = currentSort === nextSort && currentSortDir === 'desc' ? 'asc' : 'desc';
    currentSort = nextSort;
    renderTable();
  });
});

document.querySelectorAll('th.sortable').forEach(th => {
  th.addEventListener('click', function() {
    const nextSort = this.dataset.sortKey;
    currentSortDir = currentSort === nextSort && currentSortDir === 'desc' ? 'asc' : 'desc';
    currentSort = nextSort;
    renderTable();
  });
});

loadFunds();
</script>
</body>
</html>
