name: Update Yahoo Finance News

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch Yahoo Finance news
        run: python scripts/fetch_yahoo_news.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/yahoo_news.json
          git diff --cached --quiet || git commit -m "chore: update Yahoo Finance news $(date +%Y-%m-%d-%H%M)"
          git push
