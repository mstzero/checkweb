name: Update TCMB EVDS Data

on:
  schedule:
    - cron: "20 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch TCMB EVDS data
        env:
          EVDS_API_KEY: ${{ secrets.EVDS_API_KEY }}
        run: python scripts/fetch_tcmb.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tcmb_data.json
          git diff --cached --quiet || git commit -m "chore: update TCMB EVDS data $(date +%Y-%m-%d)"
          git push
